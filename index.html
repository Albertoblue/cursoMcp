<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Simulator Academy — Curso Interactivo</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#222232;
--text:#e8e6e0;--text2:#a09e94;--text3:#6b6960;
--accent:#6ee7b7;--accent2:#34d399;--accent3:#059669;
--purple:#a78bfa;--purple2:#7c3aed;
--coral:#fb7185;--coral2:#e11d48;
--amber:#fbbf24;--amber2:#d97706;
--blue:#60a5fa;--blue2:#2563eb;
--border:#2a2a3a;--border2:#3a3a4e;
--radius:12px;--radius-sm:8px;
--font-body:'DM Sans',sans-serif;
--font-code:'JetBrains Mono',monospace;
--font-display:'Playfair Display',serif;
--shadow:0 4px 24px rgba(0,0,0,.4);
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.7;overflow-x:hidden}

/* Noise overlay */
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Layout */
.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}

/* Sidebar */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:0;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.sidebar-header{padding:28px 24px 20px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-family:var(--font-display);font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px}
.sidebar-header p{font-size:12px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:1.5px}

.progress-bar{margin:16px 24px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:2px;transition:width .6s cubic-bezier(.22,1,.36,1)}
.progress-text{font-size:11px;color:var(--text3);padding:0 24px 16px;border-bottom:1px solid var(--border)}

.nav-section{padding:16px 0}
.nav-section-title{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--text3);padding:0 24px 8px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 24px;cursor:pointer;transition:all .2s;font-size:13.5px;color:var(--text2);position:relative}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{color:var(--accent);background:rgba(110,231,183,.06)}
.nav-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--accent);border-radius:0 2px 2px 0}
.nav-item.completed .nav-dot{background:var(--accent);box-shadow:0 0 8px rgba(110,231,183,.4)}
.nav-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:all .3s}
.nav-item.active .nav-dot{background:var(--accent);box-shadow:0 0 8px rgba(110,231,183,.4)}

/* Main */
.main{padding:0;overflow-y:auto}
.lesson-view{max-width:820px;margin:0 auto;padding:48px 40px 80px}

/* Lesson Header */
.lesson-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);font-weight:600;margin-bottom:16px}
.lesson-badge i{width:16px;height:16px;border-radius:50%;background:rgba(110,231,183,.15);display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-style:normal}
.lesson-title{font-family:var(--font-display);font-size:38px;font-weight:800;line-height:1.15;margin-bottom:12px;letter-spacing:-.5px}
.lesson-subtitle{font-size:16px;color:var(--text2);margin-bottom:40px;line-height:1.6}

/* Content blocks */
.content-block{margin-bottom:32px;animation:fadeUp .5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.content-block h2{font-size:22px;font-weight:700;margin-bottom:12px;color:var(--text);display:flex;align-items:center;gap:10px}
.content-block h3{font-size:17px;font-weight:600;margin-bottom:8px;color:var(--text)}
.content-block p{color:var(--text2);margin-bottom:16px;font-size:15px}
.content-block ul{color:var(--text2);padding-left:20px;margin-bottom:16px;font-size:15px}
.content-block li{margin-bottom:6px}
.content-block li::marker{color:var(--accent)}
.content-block strong{color:var(--text);font-weight:600}
.content-block a{color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(110,231,183,.3);transition:border-color .2s}
.content-block a:hover{border-color:var(--accent)}

/* Concept Cards */
.concept-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin:20px 0}
.concept-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all .3s;position:relative;overflow:hidden}
.concept-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow)}
.concept-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.concept-card.tool::before{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.concept-card.resource::before{background:linear-gradient(90deg,var(--purple),var(--purple2))}
.concept-card.prompt::before{background:linear-gradient(90deg,var(--amber),var(--amber2))}
.concept-card h4{font-size:15px;font-weight:600;margin-bottom:6px}
.concept-card p{font-size:13px;color:var(--text3);margin-bottom:0}
.concept-card .icon{font-size:24px;margin-bottom:10px;display:block}

/* Code blocks */
.code-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin:16px 0}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:12px}
.code-header .lang{color:var(--accent);font-family:var(--font-code);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.code-header .filename{color:var(--text3)}
.code-header button{background:rgba(110,231,183,.1);color:var(--accent);border:1px solid rgba(110,231,183,.2);padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:var(--font-body);transition:all .2s}
.code-header button:hover{background:rgba(110,231,183,.2)}
.code-header button.copied{background:rgba(110,231,183,.3);color:#fff}
pre{padding:20px;overflow-x:auto;font-family:var(--font-code);font-size:13px;line-height:1.7;color:var(--text2)}
pre .kw{color:var(--purple)}
pre .fn{color:var(--accent)}
pre .str{color:var(--amber)}
pre .cm{color:var(--text3);font-style:italic}
pre .type{color:var(--coral)}
pre .num{color:var(--blue)}
pre .op{color:var(--text3)}

/* Callout */
.callout{background:var(--bg3);border-left:3px solid var(--accent);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:16px 20px;margin:20px 0;font-size:14px}
.callout.warning{border-left-color:var(--amber)}
.callout.danger{border-left-color:var(--coral)}
.callout .callout-title{font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;color:var(--accent)}
.callout.warning .callout-title{color:var(--amber)}
.callout.danger .callout-title{color:var(--coral)}
.callout p{margin-bottom:0;color:var(--text2)}

/* Diagram */
.diagram-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:32px 24px;margin:24px 0;text-align:center;position:relative;overflow:hidden}
.diagram-row{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;margin:12px 0}
.d-node{padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;white-space:nowrap;border:1px solid}
.d-client{background:rgba(167,139,250,.12);border-color:rgba(167,139,250,.3);color:var(--purple)}
.d-server{background:rgba(110,231,183,.1);border-color:rgba(110,231,183,.3);color:var(--accent)}
.d-transport{background:rgba(96,165,250,.1);border-color:rgba(96,165,250,.3);color:var(--blue)}
.d-arrow{color:var(--text3);font-family:var(--font-code);font-size:16px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.diagram-label{font-size:11px;color:var(--text3);margin-top:6px;text-transform:uppercase;letter-spacing:1px}

/* Interactive Tabs */
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--radius-sm);padding:3px;margin:16px 0;overflow-x:auto}
.tab{padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;transition:all .2s;color:var(--text3);white-space:nowrap;font-weight:500;border:none;background:none;font-family:var(--font-body)}
.tab:hover{color:var(--text2)}
.tab.active{background:var(--bg);color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tab-content{display:none;animation:fadeUp .3s ease}
.tab-content.active{display:block}

/* Quiz */
.quiz-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin:24px 0}
.quiz-box h3{font-size:16px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.quiz-box h3 span{font-size:12px;background:rgba(251,191,36,.15);color:var(--amber);padding:2px 10px;border-radius:12px;font-weight:600}
.quiz-option{display:block;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;transition:all .2s;font-size:14px;color:var(--text2);width:100%;text-align:left;font-family:var(--font-body)}
.quiz-option:hover{border-color:var(--border2);color:var(--text)}
.quiz-option.correct{border-color:var(--accent);background:rgba(110,231,183,.08);color:var(--accent)}
.quiz-option.wrong{border-color:var(--coral);background:rgba(251,113,133,.08);color:var(--coral)}
.quiz-option.disabled{pointer-events:none;opacity:.6}
.quiz-feedback{margin-top:12px;padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;display:none}
.quiz-feedback.show{display:block}
.quiz-feedback.correct{background:rgba(110,231,183,.08);color:var(--accent);border:1px solid rgba(110,231,183,.2)}
.quiz-feedback.wrong{background:rgba(251,113,133,.08);color:var(--coral);border:1px solid rgba(251,113,133,.2)}

/* Nav buttons */
.lesson-nav{display:flex;justify-content:space-between;align-items:center;margin-top:48px;padding-top:32px;border-top:1px solid var(--border)}
.nav-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:var(--font-body)}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}
.nav-btn.primary{background:linear-gradient(135deg,rgba(110,231,183,.15),rgba(167,139,250,.15));border-color:var(--accent);color:var(--accent)}
.nav-btn.primary:hover{background:linear-gradient(135deg,rgba(110,231,183,.25),rgba(167,139,250,.25))}

/* Comparison Table */
.comp-table{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin:16px 0;font-size:13px}
.comp-table th{background:var(--bg3);padding:12px 16px;text-align:left;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);border-bottom:1px solid var(--border)}
.comp-table td{padding:10px 16px;border-bottom:1px solid var(--border);color:var(--text2)}
.comp-table tr:last-child td{border-bottom:none}
.comp-table tr:hover td{background:rgba(255,255,255,.02)}

/* Step indicator */
.steps{display:flex;gap:0;margin:24px 0;position:relative}
.steps::before{content:'';position:absolute;top:15px;left:24px;right:24px;height:2px;background:var(--border)}
.step{flex:1;text-align:center;position:relative;z-index:1}
.step-dot{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:13px;font-weight:600;color:var(--text3);transition:all .3s}
.step.active .step-dot{border-color:var(--accent);color:var(--accent);background:rgba(110,231,183,.1);box-shadow:0 0 12px rgba(110,231,183,.2)}
.step.done .step-dot{border-color:var(--accent);background:var(--accent);color:var(--bg)}
.step-label{font-size:11px;color:var(--text3)}
.step.active .step-label{color:var(--accent)}

/* Responsive */
@media(max-width:768px){
.app{grid-template-columns:1fr}
.sidebar{position:fixed;left:-300px;z-index:100;width:280px;transition:left .3s}
.sidebar.open{left:0}
.mobile-toggle{display:flex!important}
.lesson-view{padding:24px 20px 60px}
.lesson-title{font-size:28px}
.concept-grid{grid-template-columns:1fr}
}
.mobile-toggle{display:none;position:fixed;top:16px;left:16px;z-index:101;width:40px;height:40px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;align-items:center;justify-content:center;cursor:pointer;color:var(--text)}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}
.mobile-overlay.show{display:block}

/* Certificate */
.certificate{background:linear-gradient(135deg,var(--bg3),var(--bg2));border:2px solid var(--border2);border-radius:16px;padding:48px 32px;text-align:center;margin:24px 0;position:relative;overflow:hidden}
.certificate::before{content:'';position:absolute;inset:-2px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--purple),var(--amber));z-index:-1;opacity:.3}
.certificate h2{font-family:var(--font-display);font-size:32px;margin-bottom:8px}
.certificate p{color:var(--text2);font-size:15px}
.certificate .badge{display:inline-flex;align-items:center;gap:8px;background:rgba(110,231,183,.1);border:1px solid rgba(110,231,183,.3);padding:8px 20px;border-radius:24px;margin-top:16px;font-weight:600;color:var(--accent);font-size:14px}

/* ─── Instructor card ───────────────────────────────── */
.instructor-card{display:grid;grid-template-columns:280px 1fr;gap:32px;background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border2);border-radius:16px;padding:32px;margin:20px 0;position:relative;overflow:hidden}
.instructor-card::before{content:'';position:absolute;top:-30%;right:-20%;width:60%;height:160%;background:radial-gradient(circle,rgba(167,139,250,.12),transparent 70%);pointer-events:none}
.instructor-card::after{content:'';position:absolute;bottom:-40%;left:-10%;width:50%;height:120%;background:radial-gradient(circle,rgba(110,231,183,.08),transparent 70%);pointer-events:none}
.instructor-photo-wrap{position:relative;z-index:1;border-radius:12px;overflow:hidden;border:2px solid var(--border2);box-shadow:0 10px 40px rgba(0,0,0,.5);aspect-ratio:3/4}
.instructor-photo{width:100%;height:100%;object-fit:cover;object-position:center 40%;transform:scale(1.22);transform-origin:center 45%;display:block}
.instructor-photo-frame{position:absolute;inset:-3px;border-radius:14px;background:linear-gradient(135deg,var(--purple),var(--accent));z-index:-1;opacity:.3;filter:blur(8px)}
.instructor-info{position:relative;z-index:1;display:flex;flex-direction:column;justify-content:center}
.instructor-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--accent);font-weight:700;margin-bottom:8px}
.instructor-name{font-family:var(--font-display);font-size:30px;font-weight:800;line-height:1.15;margin-bottom:6px;letter-spacing:-.5px}
.instructor-title{font-size:14px;color:var(--text2);font-weight:500;margin-bottom:20px}
.instructor-bio p{color:var(--text2);font-size:14.5px;line-height:1.7;margin-bottom:10px}
.credentials{display:flex;flex-direction:column;gap:10px;margin-top:20px}
.credential{display:flex;gap:12px;align-items:center;padding:12px 14px;background:rgba(10,10,15,.4);border-radius:10px;border:1px solid var(--border);backdrop-filter:blur(8px)}
.credential-ico{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,rgba(110,231,183,.15),rgba(167,139,250,.15));border:1px solid rgba(110,231,183,.2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.credential-text strong{display:block;font-size:13.5px;color:var(--text);margin-bottom:2px;font-weight:700}
.credential-text span{font-size:12px;color:var(--text3);line-height:1.4}
@media(max-width:640px){.instructor-card{grid-template-columns:1fr;padding:24px}}

/* ─── LinkedIn / QR card ────────────────────────────── */
.linkedin-card{display:grid;grid-template-columns:auto 1fr;gap:28px;align-items:center;background:linear-gradient(135deg,rgba(10,102,194,.1),rgba(167,139,250,.06));border:1px solid rgba(10,102,194,.3);border-radius:16px;padding:24px;margin:20px 0;position:relative;overflow:hidden}
.linkedin-card::before{content:'';position:absolute;top:-40%;right:-15%;width:50%;height:180%;background:radial-gradient(circle,rgba(10,102,194,.15),transparent 70%);pointer-events:none}
.qr-box{background:#fff;padding:14px;border-radius:14px;box-shadow:0 14px 40px rgba(10,102,194,.25);display:flex;align-items:center;justify-content:center;position:relative;z-index:1}
.qr-box img{display:block;width:160px;height:160px}
.linkedin-info{position:relative;z-index:1}
.linkedin-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:#4d9fff;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.linkedin-info h3{font-family:var(--font-display);font-size:26px;margin-bottom:8px;color:var(--text);letter-spacing:-.3px}
.linkedin-info p{color:var(--text2);font-size:14px;margin-bottom:16px;line-height:1.6}
.linkedin-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:#0a66c2;color:#fff!important;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;border-bottom:none!important;transition:all .2s}
.linkedin-btn:hover{background:#0854a0;transform:translateY(-1px);border-bottom:none!important}
@media(max-width:640px){.linkedin-card{grid-template-columns:1fr;text-align:center;justify-items:center}}

.course-card{display:grid;grid-template-columns:auto 1fr;gap:28px;align-items:center;background:linear-gradient(135deg,rgba(110,231,183,.1),rgba(167,139,250,.06));border:1px solid rgba(110,231,183,.3);border-radius:16px;padding:24px;margin:20px 0;position:relative;overflow:hidden}
.course-card::before{content:'';position:absolute;top:-40%;right:-15%;width:50%;height:180%;background:radial-gradient(circle,rgba(110,231,183,.15),transparent 70%);pointer-events:none}
.course-card .qr-box{box-shadow:0 14px 40px rgba(110,231,183,.2)}
.course-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--accent);font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px;position:relative;z-index:1}
.course-card h3{font-family:var(--font-display);font-size:26px;margin-bottom:8px;color:var(--text);letter-spacing:-.3px;position:relative;z-index:1}
.course-card p{color:var(--text2);font-size:14px;margin-bottom:16px;line-height:1.6;position:relative;z-index:1}
.course-card .course-url{font-family:var(--font-code);font-size:12px;color:var(--accent);margin-bottom:16px;position:relative;z-index:1;word-break:break-all}
.course-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:linear-gradient(135deg,var(--accent2),var(--accent3));color:var(--bg)!important;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;border-bottom:none!important;transition:all .2s;position:relative;z-index:1}
.course-btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(110,231,183,.3);border-bottom:none!important}
@media(max-width:640px){.course-card{grid-template-columns:1fr;text-align:center;justify-items:center}}

.web-card{display:grid;grid-template-columns:auto 1fr;gap:28px;align-items:center;background:linear-gradient(135deg,rgba(251,191,36,.1),rgba(167,139,250,.06));border:1px solid rgba(251,191,36,.3);border-radius:16px;padding:24px;margin:20px 0;position:relative;overflow:hidden}
.web-card::before{content:'';position:absolute;top:-40%;right:-15%;width:50%;height:180%;background:radial-gradient(circle,rgba(251,191,36,.15),transparent 70%);pointer-events:none}
.web-card .qr-box{box-shadow:0 14px 40px rgba(251,191,36,.2)}
.web-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--amber);font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px;position:relative;z-index:1}

// ─── 1: Qué es un agente ───────────────────────────────
{
title: "¿Qué es un agente de IA?",
subtitle: "Definición, anatomía y ejemplos técnicos de agentes y skills",
badge: "Lección 2",
content: `
<div class="content-block">
<h2>Definición</h2>
<p>Un <strong>agente de IA</strong> es un sistema que combina un <strong>LLM</strong> (para razonar) con un <strong>conjunto de herramientas</strong> (para actuar) dentro de un <strong>loop de ejecución</strong> que se repite hasta completar un objetivo.</p>
<p>La diferencia clave con un chatbot tradicional es que el agente <strong>actúa</strong>: no solo responde con texto, sino que invoca funciones reales, observa los resultados y decide qué hacer a continuación.</p>
</div>

<div class="content-block">
<h2>El ciclo ReAct (Reason → Act → Observe)</h2>
<p>El patrón dominante para construir agentes se llama <strong>ReAct</strong>. El agente alterna entre tres fases en un bucle:</p>

<div class="steps">
<div class="step done"><div class="step-dot">1</div><div class="step-label">Reason<br>razonar</div></div>
<div class="step done"><div class="step-dot">2</div><div class="step-label">Act<br>invocar tool</div></div>
<div class="step active"><div class="step-dot">3</div><div class="step-label">Observe<br>ver resultado</div></div>
<div class="step"><div class="step-dot">4</div><div class="step-label">Repeat<br>o terminar</div></div>
</div>

<p>En cada iteración, el LLM recibe el historial de pensamientos y observaciones, decide si ya tiene suficiente información para responder al usuario, o si necesita invocar otra herramienta.</p>
</div>

<div class="content-block">
<h2>Anatomía: los 4 componentes de un agente</h2>
<table class="comp-table">
<thead><tr><th>Componente</th><th>Rol</th><th>Ejemplo</th></tr></thead>
<tbody>
<tr><td><strong>Modelo (LLM)</strong></td><td>Razona y decide</td><td>Claude, GPT-4, Llama</td></tr>
<tr><td><strong>Prompt de sistema</strong></td><td>Define el rol y las reglas</td><td>"Eres un asistente de soporte..."</td></tr>
<tr><td><strong>Tools / Skills</strong></td><td>Acciones ejecutables</td><td>buscar_web, enviar_email, query_db</td></tr>
<tr><td><strong>Loop de ejecución</strong></td><td>Orquesta ReAct</td><td>while !done: step()</td></tr>
</tbody>
</table>
</div>

<div class="content-block">
<h2>Ejemplo técnico: agente mínimo en TypeScript</h2>
<p>Este es un agente completo con el loop ReAct usando el SDK de Anthropic. Fíjate en cómo el agente invoca tools repetidamente hasta que decide responder:</p>
<div class="code-block">
<div class="code-header"><span class="lang">TypeScript</span><span class="filename">agent.ts</span><button onclick="copyCode(this)">Copiar</button></div>
<pre><span class="kw">import</span> Anthropic <span class="kw">from</span> <span class="str">"@anthropic-ai/sdk"</span>;

<span class="kw">const</span> client = <span class="kw">new</span> <span class="fn">Anthropic</span>();

<span class="cm">// 1. Definición de tools que el agente puede invocar</span>
<span class="kw">const</span> tools = [
  {
    name: <span class="str">"get_weather"</span>,
    description: <span class="str">"Consulta el clima de una ciudad"</span>,
    input_schema: {
      type: <span class="str">"object"</span>,
      properties: { ciudad: { type: <span class="str">"string"</span> } },
      required: [<span class="str">"ciudad"</span>]
    }
  },
  {
    name: <span class="str">"send_email"</span>,
    description: <span class="str">"Envía un email"</span>,
    input_schema: {
      type: <span class="str">"object"</span>,
      properties: {
        to: { type: <span class="str">"string"</span> },
        subject: { type: <span class="str">"string"</span> },
        body: { type: <span class="str">"string"</span> }
      },
      required: [<span class="str">"to"</span>, <span class="str">"subject"</span>, <span class="str">"body"</span>]
    }
  }
];

<span class="cm">// 2. Implementación real de las tools</span>
<span class="kw">async function</span> <span class="fn">executeTool</span>(name, input) {
  <span class="kw">if</span> (name === <span class="str">"get_weather"</span>) {
    <span class="kw">return</span> <span class="kw">await</span> <span class="fn">fetchWeather</span>(input.ciudad);
  }
  <span class="kw">if</span> (name === <span class="str">"send_email"</span>) {
    <span class="kw">return</span> <span class="kw">await</span> <span class="fn">sendEmail</span>(input.to, input.subject, input.body);
  }
}

<span class="cm">// 3. Loop del agente (ReAct)</span>
<span class="kw">async function</span> <span class="fn">runAgent</span>(userMessage) {
  <span class="kw">const</span> messages = [{ role: <span class="str">"user"</span>, content: userMessage }];

  <span class="kw">while</span> (<span class="kw">true</span>) {
    <span class="kw">const</span> response = <span class="kw">await</span> client.messages.<span class="fn">create</span>({
      model: <span class="str">"claude-opus-4-7"</span>,
      max_tokens: <span class="num">1024</span>,
      tools,
      messages
    });

    <span class="cm">// El modelo decidió responder al usuario → terminamos</span>
    <span class="kw">if</span> (response.stop_reason === <span class="str">"end_turn"</span>) {
      <span class="kw">return</span> response.content;
    }

    <span class="cm">// El modelo quiere invocar una tool</span>
    <span class="kw">if</span> (response.stop_reason === <span class="str">"tool_use"</span>) {
      <span class="kw">const</span> toolUse = response.content.<span class="fn">find</span>(b => b.type === <span class="str">"tool_use"</span>);
      <span class="kw">const</span> result = <span class="kw">await</span> <span class="fn">executeTool</span>(toolUse.name, toolUse.input);

      messages.<span class="fn">push</span>({ role: <span class="str">"assistant"</span>, content: response.content });
      messages.<span class="fn">push</span>({
        role: <span class="str">"user"</span>,
        content: [{
          type: <span class="str">"tool_result"</span>,
          tool_use_id: toolUse.id,
          content: JSON.<span class="fn">stringify</span>(result)
        }]
      });
      <span class="cm">// El loop continúa: el modelo verá el resultado</span>
    }
  }
}

<span class="cm">// Uso</span>
<span class="kw">await</span> <span class="fn">runAgent</span>(<span class="str">"¿Qué clima hace en Bogotá? Si llueve, avísame por email a jefe@acme.com"</span>);</pre>
</div>
<p>En este ejemplo el agente puede ejecutar <code>get_weather</code>, ver el resultado, y <strong>decidir por sí mismo</strong> si también debe llamar a <code>send_email</code>. Ese encadenamiento autónomo es lo que lo hace "agente".</p>
</div>

{
title: "¿Qué es MCP?",
subtitle: "Descubre el protocolo que estandariza la conexión entre LLMs y el mundo exterior",
badge: "Lección 3",
content: `
<div class="content-block">
<h2>El problema que resuelve</h2>
<p>Antes de MCP, cada vez que querías conectar un modelo de lenguaje (como Claude) a una fuente de datos externa — una base de datos, una API, archivos locales — tenías que escribir <strong>integraciones personalizadas</strong> para cada caso. Si tenías 10 herramientas, necesitabas 10 integraciones distintas.</p>
<p><strong>Model Context Protocol (MCP)</strong> es un estándar abierto creado por Anthropic que define una forma universal para que los LLMs se comuniquen con servicios externos. Piensa en él como un <strong>"USB para la IA"</strong>: un conector estándar que funciona con cualquier herramienta.</p>

{
title: "Primitivas: Tools",
subtitle: "Funciones que el LLM puede invocar para realizar acciones",
badge: "Lección 5",
content: `
<div class="content-block">
<h2>¿Qué son las Tools?</h2>
<p>Las <strong>Tools</strong> (herramientas) son funciones que el servidor expone y que el LLM puede decidir invocar durante una conversación. Son el equivalente al "function calling" pero estandarizado.</p>
<p>Cada tool tiene:</p>
<ul>
<li><strong>Nombre</strong> — identificador único (ej: <code>crear_tarea</code>)</li>
<li><strong>Descripción</strong> — texto que el LLM lee para decidir cuándo usarla</li>
<li><strong>Schema de entrada</strong> — parámetros validados con Zod</li>
<li><strong>Handler</strong> — la función que se ejecuta</li>
</ul>
</div>

<div class="content-block">
<h2>Ejemplo en TypeScript</h2>
<div class="code-block">
<div class="code-header">
<span class="lang">TypeScript</span>
<span class="filename">tools.ts</span>
<button onclick="copyCode(this)">Copiar</button>
</div>
<pre><span class="kw">import</span> { McpServer } <span class="kw">from</span> <span class="str">"@modelcontextprotocol/sdk/server/mcp.js"</span>;
<span class="kw">import</span> { z } <span class="kw">from</span> <span class="str">"zod"</span>;

<span class="kw">const</span> server = <span class="kw">new</span> <span class="fn">McpServer</span>({
  name: <span class="str">"mi-servidor"</span>,
  version: <span class="str">"1.0.0"</span>
});

<span class="cm">// Registrar una tool</span>
server.<span class="fn">tool</span>(
  <span class="str">"obtener_clima"</span>,           <span class="cm">// nombre</span>
  <span class="str">"Consulta el clima actual de una ciudad"</span>, <span class="cm">// descripción</span>
  {                               <span class="cm">// schema (Zod)</span>
    ciudad: z.<span class="fn">string</span>().<span class="fn">describe</span>(<span class="str">"Nombre de la ciudad"</span>),
    unidad: z.<span class="fn">enum</span>([<span class="str">"celsius"</span>, <span class="str">"fahrenheit"</span>])
              .<span class="fn">optional</span>()
              .<span class="fn">describe</span>(<span class="str">"Unidad de temperatura"</span>)
  },
  <span class="kw">async</span> ({ ciudad, unidad }) => {  <span class="cm">// handler</span>
    <span class="kw">const</span> data = <span class="kw">await</span> <span class="fn">fetchWeather</span>(ciudad, unidad);
    <span class="kw">return</span> {
      content: [{
        type: <span class="str">"text"</span>,
        text: <span class="str">\`Clima en \${ciudad}: \${data.temp}°\`</span>
      }]
    };
  }
);</pre>
</div>
</div>

<div class="content-block">
<h2>Anatomía de la respuesta</h2>
<p>Una tool siempre retorna un objeto con un array <code>content</code> que puede contener bloques de texto o imágenes:</p>
<div class="code-block">
<div class="code-header"><span class="lang">TypeScript</span><span class="filename">response</span></div>
<pre><span class="cm">// Respuesta exitosa</span>
{
  content: [
    { type: <span class="str">"text"</span>, text: <span class="str">"Resultado aquí"</span> }
  ]
}

<span class="cm">// Respuesta con error</span>
{
  content: [
    { type: <span class="str">"text"</span>, text: <span class="str">"No se encontró la ciudad"</span> }
  ],
  isError: <span class="kw">true</span>
}</pre>
</div>
</div>

<div class="content-block">
<div class="callout">
<div class="callout-title">Buena práctica</div>
<p>Las <strong>descripciones</strong> son críticas: son lo que el LLM lee para decidir si invoca tu tool. Sé específico y claro. Una descripción vaga como "hace cosas con datos" hará que el modelo no sepa cuándo usarla.</p>
</div>
</div>

// ─── 7: Transportes ─────────────────────────────────────
{
title: "Transportes: STDIO, HTTP y SSE",
subtitle: "Los tres medios de comunicación entre cliente y servidor MCP",
badge: "Lección 8",
content: `
<div class="content-block">
<h2>¿Qué es un transporte?</h2>
<p>El transporte define <strong>cómo</strong> viajan los mensajes JSON-RPC entre el cliente y el servidor. MCP soporta tres: STDIO, Streamable HTTP, y SSE (deprecado).</p>
</div>

<div class="content-block">
<h2>STDIO — Comunicación local</h2>
<p>El cliente lanza el servidor como <strong>proceso hijo</strong>. Los mensajes fluyen por <code>stdin</code> (entrada) y <code>stdout</code> (salida). No hay red involucrada.</p>
<div class="code-block">
<div class="code-header"><span class="lang">TypeScript</span><span class="filename">stdio.ts</span><button onclick="copyCode(this)">Copiar</button></div>
<pre><span class="kw">import</span> { StdioServerTransport }
  <span class="kw">from</span> <span class="str">"@modelcontextprotocol/sdk/server/stdio.js"</span>;

<span class="kw">const</span> transport = <span class="kw">new</span> <span class="fn">StdioServerTransport</span>();
<span class="kw">await</span> server.<span class="fn">connect</span>(transport);

<span class="cm">// ⚠️ NUNCA usar console.log() en modo STDIO</span>
<span class="cm">// Escribe en stdout y corrompe los mensajes JSON-RPC</span>
console.<span class="fn">error</span>(<span class="str">"Usa console.error() en su lugar"</span>);</pre>
</div>
<div class="callout danger">
<div class="callout-title">Error común</div>
<p>Usar <code>console.log()</code> en un servidor STDIO rompe la comunicación porque escribe en stdout, que es el mismo canal por donde viajan los mensajes JSON-RPC.</p>
</div>
</div>

<div class="content-block">
<h2>Streamable HTTP — Servidor remoto</h2>
<p>Un endpoint HTTP único (<code>/mcp</code>) maneja toda la comunicación. Soporta múltiples sesiones concurrentes y es el estándar recomendado para producción.</p>
<div class="code-block">
<div class="code-header"><span class="lang">TypeScript</span><span class="filename">http.ts</span><button onclick="copyCode(this)">Copiar</button></div>
<pre><span class="kw">import</span> { StreamableHTTPServerTransport }
  <span class="kw">from</span> <span class="str">"@modelcontextprotocol/sdk/server/streamableHttp.js"</span>;
<span class="kw">import</span> express <span class="kw">from</span> <span class="str">"express"</span>;

<span class="kw">const</span> app = <span class="fn">express</span>();
app.<span class="fn">use</span>(express.<span class="fn">json</span>());

app.<span class="fn">post</span>(<span class="str">"/mcp"</span>, <span class="kw">async</span> (req, res) => {
  <span class="kw">const</span> transport = <span class="kw">new</span> <span class="fn">StreamableHTTPServerTransport</span>({
    sessionIdGenerator: () => <span class="fn">randomUUID</span>(),
  });
  <span class="kw">await</span> server.<span class="fn">connect</span>(transport);
  <span class="kw">await</span> transport.<span class="fn">handleRequest</span>(req, res, req.body);
});

app.<span class="fn">listen</span>(<span class="num">3000</span>);</pre>
</div>
</div>

<div class="content-block">
<h2>Comparativa rápida</h2>
<table class="comp-table">
<thead><tr><th>Característica</th><th>STDIO</th><th>Streamable HTTP</th><th>SSE (Deprecado)</th></tr></thead>
<tbody>
<tr><td><strong>Ubicación</strong></td><td>Local</td><td>Local o remoto</td><td>Remoto</td></tr>
<tr><td><strong>Usuarios</strong></td><td>1</td><td>N (sesiones)</td><td>N (limitado)</td></tr>
<tr><td><strong>Bidireccional</strong></td><td>Sí</td><td>Sí</td><td>Parcial</td></tr>
<tr><td><strong>Configuración</strong></td><td>Mínima</td><td>Express/HTTP</td><td>2 endpoints</td></tr>
<tr><td><strong>Caso de uso</strong></td><td>Claude Desktop</td><td>Cloud / producción</td><td>Legacy</td></tr>
</tbody>
</table>
</div>

${quiz(7, "¿Cuál es el transporte recomendado para un servidor MCP en producción?", [
"STDIO siempre es mejor",
"SSE porque es más simple",
"Streamable HTTP",
"WebSockets"
], 2, "Streamable HTTP es el estándar recomendado para servidores remotos y en producción. Usa un único endpoint /mcp, soporta sesiones múltiples y comunicación bidireccional.")}
`
},

// ─── Quiz generator ──────────────────────────────────────
function quiz(id, question, options, correctIdx, explanation) {
return `
<div class="quiz-box" id="quiz-${id}">
<h3>${question} <span>Quiz</span></h3>
${options.map((opt, i) => `
<button class="quiz-option" onclick="checkQuiz(${id},${i},${correctIdx})">${opt}</button>
`).join('')}
<div class="quiz-feedback" id="feedback-${id}"></div>
</div>`;
}

// ─── State ───────────────────────────────────────────────
let currentLesson = 0;
const completed = new Set();

function render() {
  const lesson = lessons[currentLesson];
  const main = document.getElementById('main');
  main.innerHTML = `
  <div class="lesson-view">
    <div class="lesson-badge"><i>▶</i> ${lesson.badge}</div>
    <h1 class="lesson-title">${lesson.title}</h1>
    <p class="lesson-subtitle">${lesson.subtitle}</p>
    ${lesson.content}
    <div class="lesson-nav">
      ${currentLesson > 0 ? `<button class="nav-btn" onclick="goTo(${currentLesson-1})">← Anterior</button>` : '<div></div>'}
      ${currentLesson < lessons.length - 1 ? `<button class="nav-btn primary" onclick="completeAndNext()">Siguiente lección →</button>` : `<button class="nav-btn primary" onclick="completeCourse()">Finalizar curso ✦</button>`}
    </div>
  </div>`;
  main.scrollTop = 0;
  updateNav();
}

function updateNav() {
  const items = document.querySelectorAll('.nav-item');
  items.forEach((item, i) => {
    item.classList.toggle('active', i === currentLesson);
    item.classList.toggle('completed', completed.has(i));
  });
  const pct = Math.round((completed.size / lessons.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${completed.size} de ${lessons.length} lecciones completadas`;
}

function goTo(idx) {
  currentLesson = idx;
  render();
  closeSidebar();
}

function completeAndNext() {
  completed.add(currentLesson);
  if (currentLesson < lessons.length - 1) {
    currentLesson++;
    render();
  }
}

function completeCourse() {
  completed.add(currentLesson);
  updateNav();
  const cert = document.getElementById('certificate-area');
  if (cert) { cert.style.display = 'block'; cert.scrollIntoView({ behavior: 'smooth' }); }
}

// ─── Quiz logic ──────────────────────────────────────────
function checkQuiz(quizId, selected, correct) {
  const quiz = document.getElementById(`quiz-${quizId}`);
  const buttons = quiz.querySelectorAll('.quiz-option');
  const feedback = document.getElementById(`feedback-${quizId}`);

  buttons.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === correct) btn.classList.add('correct');
    if (i === selected && i !== correct) btn.classList.add('wrong');
  });

  const isCorrect = selected === correct;
  feedback.className = `quiz-feedback show ${isCorrect ? 'correct' : 'wrong'}`;
  feedback.innerHTML = isCorrect
    ? `✓ ¡Correcto! ${feedback.parentElement.querySelector('.quiz-option.correct').textContent.trim()}`
    : `✗ Incorrecto. La respuesta correcta era: "${buttons[correct].textContent.trim()}"`;

  // Extract explanation from quiz content
  const allQuizzes = document.querySelectorAll('.quiz-box');
  // Mark lesson complete if all quizzes answered
  completed.add(currentLesson);
  updateNav();
}

// ─── Tabs ────────────────────────────────────────────────
function switchTab(ev, id) {
  const container = ev.target.closest('.content-block');
  container.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  container.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  ev.target.classList.add('active');
  document.getElementById(id).classList.add('active');
}

// ─── Copy code ───────────────────────────────────────────
function copyCode(btn) {
  const pre = btn.closest('.code-block').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent).then(() => {
    btn.textContent = '¡Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2000);
  });
}

// ─── Mobile sidebar ──────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.querySelector('.mobile-overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.querySelector('.mobile-overlay').classList.remove('show');
}

// ─── Init ────────────────────────────────────────────────
render();
</script>
